<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog | Taylor Thompson Home Group</title>
  <style>
    :root {
      --bg: #f7f2ed;
      --ink: #050505;
      --muted: #765f50;
      --tan: #c8ad9a;
      --line: #d9cec5;
      --white: #fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Montserrat", Arial, sans-serif;
      line-height: 1.65;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a { color: inherit; }

    .blog-page {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 56px 0 84px;
    }

    .page-title {
      margin: 0 0 34px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(44px, 7vw, 76px);
      font-weight: 400;
      line-height: 1;
    }

    .page-title em {
      color: var(--tan);
      font-style: italic;
    }

    .featured {
      display: none;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 0.9fr);
      gap: clamp(36px, 5vw, 64px);
      align-items: center;
      padding: 36px 0 72px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 38px;
    }

    .featured.is-visible { display: grid; }

    .featured img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: var(--tan);
    }

    .eyebrow,
    .meta,
    .card-category {
      color: #a77e67;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .featured h2 {
      margin: 12px 0 22px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(38px, 5vw, 58px);
      font-weight: 400;
      line-height: 1.12;
    }

    .featured-excerpt {
      margin: 0 0 24px;
      color: var(--muted);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 18px 28px;
      margin-bottom: 24px;
    }

    .button {
      display: inline-block;
      border: 0;
      background: #000;
      color: #fff;
      padding: 14px 28px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
    }

    .blog-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      gap: 12px;
      margin-bottom: 14px;
    }

    .blog-tools input,
    .blog-tools select {
      width: 100%;
      border: 1px solid #cfc7bf;
      background: #fff;
      color: var(--ink);
      min-height: 48px;
      padding: 0 14px;
      font: inherit;
      font-size: 13px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 28px;
    }

    .filter {
      border: 1px solid #cfc7bf;
      background: transparent;
      min-height: 38px;
      padding: 0 16px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .filter.active {
      background: #000;
      border-color: #000;
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
    }

    .card {
      display: flex;
      min-height: 100%;
      background: var(--white);
      flex-direction: column;
    }

    .card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: var(--tan);
    }

    .card-body {
      display: flex;
      flex: 1;
      flex-direction: column;
      padding: 26px 24px 28px;
    }

    .card h3 {
      margin: 18px 0 14px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 25px;
      font-weight: 400;
      line-height: 1.2;
    }

    .card p {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 14px;
    }

    .card .button {
      margin-top: auto;
      align-self: flex-start;
      padding: 12px 22px;
    }

    .empty {
      display: none;
      padding: 40px;
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--muted);
    }

    .empty.is-visible { display: block; }

    @media (max-width: 900px) {
      .featured,
      .grid,
      .blog-tools {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="blog-page">
    <section class="featured" id="featured-blog" aria-label="Featured blog"></section>

    <header>
      <h1 class="page-title">Latest <em>Blogs</em></h1>
    </header>

    <div class="blog-tools">
      <input id="blog-search" type="search" placeholder="Search blog keywords">
      <select id="blog-sort" aria-label="Sort blog posts">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>
    </div>

    <nav class="filters" aria-label="Blog categories">
      <button class="filter active" type="button" data-category="ALL">All</button>
      <button class="filter" type="button" data-category="Market Updates">Market Updates</button>
      <button class="filter" type="button" data-category="Buyer Tips">Buyer Tips</button>
      <button class="filter" type="button" data-category="Seller Tips">Seller Tips</button>
      <button class="filter" type="button" data-category="First-Time Buyers">First-Time Buyers</button>
      <button class="filter" type="button" data-category="Investment">Investment</button>
      <button class="filter" type="button" data-category="Local Spotlight">Local Spotlight</button>
    </nav>

    <section class="grid" id="blog-grid" aria-live="polite"></section>
    <p class="empty" id="blog-empty">No blog posts are published yet.</p>
  </main>

  <script>
    const categories = [
      "Market Updates",
      "Buyer Tips",
      "Seller Tips",
      "First-Time Buyers",
      "Investment",
      "Local Spotlight",
    ];
    let posts = [];
    let activeCategory = "ALL";

    function slugify(value) {
      return String(value || "")
        .toLowerCase()
        .trim()
        .replace(/&/g, "and")
        .replace(/['"]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function assetPath(value) {
      if (!value) return "";
      if (/^(https?:)?\/\//.test(value) || value.charAt(0) === "/") return value;
      return "/" + value.replace(/^\.?\//, "");
    }

    function postUrl(post) {
      return post.url || post.link || post.permalink || "/blog/" + (post.slug || slugify(post.title));
    }

    function postCategory(post) {
      const value = post.category || (post.categories && post.categories[0]) || "";
      const match = categories.find((category) => slugify(category) === slugify(value));
      return match || value;
    }

    function postDate(post) {
      return new Date(post.date || post.publishDate || 0).getTime();
    }

    function isFeatured(post) {
      return post.featured === true || post.isFeatured === true || post.featuredPost === true;
    }

    function renderFeatured() {
      const featured = posts.filter(isFeatured).sort((a, b) => postDate(b) - postDate(a))[0];
      const container = document.getElementById("featured-blog");

      if (!featured) {
        container.classList.remove("is-visible");
        container.innerHTML = "";
        return;
      }

      const image = featured.featuredImage || featured.image || "";
      container.innerHTML = `
        <div>${image ? `<img src="${escapeHtml(assetPath(image))}" alt="${escapeHtml(featured.imageAlt || featured.title || "")}">` : ""}</div>
        <div>
          <p class="eyebrow">Featured Blog</p>
          <h2>${escapeHtml(featured.title || "")}</h2>
          <p class="featured-excerpt">${escapeHtml(featured.excerpt || "")}</p>
          <div class="meta">
            <span>${escapeHtml(postCategory(featured))}</span>
            <span>${escapeHtml(featured.date || featured.publishDate || "")}</span>
          </div>
          <a class="button" href="${escapeHtml(postUrl(featured))}">Read Full Blog</a>
        </div>
      `;
      container.classList.add("is-visible");
    }

    function filteredPosts() {
      const search = slugify(document.getElementById("blog-search").value);
      const sort = document.getElementById("blog-sort").value;

      return posts
        .filter((post) => {
          const categoryMatch = activeCategory === "ALL" || slugify(postCategory(post)) === slugify(activeCategory);
          const searchMatch = !search || slugify([post.title, post.excerpt, postCategory(post)].join(" ")).includes(search);
          return categoryMatch && searchMatch;
        })
        .sort((a, b) => sort === "oldest" ? postDate(a) - postDate(b) : postDate(b) - postDate(a));
    }

    function renderGrid() {
      const grid = document.getElementById("blog-grid");
      const empty = document.getElementById("blog-empty");
      const visiblePosts = filteredPosts();

      grid.innerHTML = visiblePosts.map((post) => {
        const image = post.featuredImage || post.image || "";
        return `
          <article class="card">
            ${image ? `<img src="${escapeHtml(assetPath(image))}" alt="${escapeHtml(post.imageAlt || post.title || "")}">` : ""}
            <div class="card-body">
              <div class="card-category">${escapeHtml(postCategory(post))}</div>
              <h3>${escapeHtml(post.title || "")}</h3>
              <p>${escapeHtml(post.excerpt || "")}</p>
              <a class="button" href="${escapeHtml(postUrl(post))}">Read Full Blog</a>
            </div>
          </article>
        `;
      }).join("");

      empty.classList.toggle("is-visible", visiblePosts.length === 0);
    }

    function setCategory(category) {
      activeCategory = category;
      document.querySelectorAll(".filter").forEach((button) => {
        button.classList.toggle("active", button.dataset.category === category);
      });
      renderGrid();
    }

    document.querySelectorAll(".filter").forEach((button) => {
      button.addEventListener("click", () => setCategory(button.dataset.category));
    });
    document.getElementById("blog-search").addEventListener("input", renderGrid);
    document.getElementById("blog-sort").addEventListener("change", renderGrid);

    fetch("/assets/data/blog-posts.json")
      .then((response) => response.json())
      .then((data) => {
        posts = Array.isArray(data) ? data : data.posts || [];
        renderFeatured();
        renderGrid();
      })
      .catch(() => {
        document.getElementById("blog-empty").classList.add("is-visible");
      });
  </script>
</body>
</html>
