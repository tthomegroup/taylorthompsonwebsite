backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    editor:
      preview: true
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The public blog post title."

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        hint: "Used for sorting posts newest first."

      - label: "Read Time"
        name: "readTime"
        widget: "select"
        required: true
        options:
          - label: "3 Min Read"
            value: "3 Min Read"
          - label: "5 Min Read"
            value: "5 Min Read"
          - label: "7 min"
            value: "7 min"
          - label: "10 min"
            value: "10 min"
        hint: "Choose the estimated reading time."

      - label: "Category"
        name: "category"
        widget: "select"
        required: true
        options:
          - label: "MARKET UPDATES"
            value: "Market Updates"
          - label: "BUYER TIPS"
            value: "Buyer Tips"
          - label: "SELLER TIPS"
            value: "Seller Tips"
          - label: "FIRST-TIME BUYERS"
            value: "First-Time Buyers"
          - label: "INVESTMENT"
            value: "Investment"
          - label: "LOCAL SPOTLIGHT"
            value: "Local Spotlight"
        hint: "Choose the main category for this post."

      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "Short summary used on blog cards."

      - label: "Featured Image"
        name: "featuredImage"
        widget: "image"
        required: false
        hint: "Shown anywhere the current frontend displays the blog image."

      - label: "Image Alt Text"
        name: "imageAlt"
        widget: "string"
        required: false
        hint: "Describe the image for accessibility."

      - label: "Featured Post"
        name: "featured"
        widget: "boolean"
        default: false
        required: true
        true_label: "Featured"
        false_label: "Not Featured"
        hint: "Turn on for posts that should appear in featured blog areas."

      - label: "Body"
        name: "body"
        widget: "markdown"
        required: false
        buttons:
          - bold
          - italic
          - code
          - link
          - heading-two
          - heading-three
          - bulleted-list
          - numbered-list
          - quote
        editor_components:
          - image
        modes:
          - rich_text
          - raw
        hint: "Use H2 for main sections and H3 for subsections."
