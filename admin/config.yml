backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    filter:
      field: "published"
      value: true
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    editor:
      preview: true
    fields:
      - label: "Published"
        name: "published"
        widget: "hidden"
        default: true

      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Read Time"
        name: "readTime"
        widget: "select"
        options:
          - label: "3 Min Read"
            value: "3 Min Read"
          - label: "5 Min Read"
            value: "5 Min Read"
          - label: "7 min"
            value: "7 min"
          - label: "10 min"
            value: "10 min"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - label: "MARKET UPDATES"
            value: "Market Updates"
          - label: "BUYER TIPS"
            value: "Buyer Tips"
          - label: "SELLER TIPS"
            value: "Seller Tips"
          - label: "FIRST-TIME BUYERS"
            value: "First-Time Buyers"
          - label: "INVESTMENT"
            value: "Investment"
          - label: "LOCAL SPOTLIGHT"
            value: "Local Spotlight"

      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        required: false

      - label: "Featured Image"
        name: "featuredImage"
        widget: "image"
        required: false

      - label: "Image Alt Text"
        name: "imageAlt"
        widget: "string"
        required: false

      - label: "Featured Blog"
        name: "featured"
        widget: "boolean"
        default: false
        true_label: "Featured"
        false_label: "Not Featured"
        hint: "If multiple posts are marked featured, the most recently changed one wins and the site only shows one."

      - label: "Body"
        name: "body"
        widget: "markdown"
        required: false
        buttons:
          - bold
          - italic
          - code
          - link
          - heading-two
          - heading-three
          - bulleted-list
          - numbered-list
          - quote
        editor_components:
          - image
        modes:
          - rich_text
          - raw
